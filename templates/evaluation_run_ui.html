<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Evaluation Run</title>
  <style>
    body { font-family: "Segoe UI", Arial, sans-serif; margin: 0; background: #f5f7fb; color: #111827; }
    .wrap { max-width: 1200px; margin: 0 auto; padding: 24px; }
    .panel { background: #fff; border: 1px solid #d8dee9; border-radius: 12px; padding: 16px; margin-bottom: 16px; }
    .top { display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
    .nav { display: flex; gap: 8px; flex-wrap: wrap; }
    .nav a, .nav button { border: 1px solid #d8dee9; border-radius: 8px; padding: 8px 10px; font-size: 13px; text-decoration: none; background: #fff; color: #111827; cursor: pointer; }
    h1 { margin: 0 0 8px; font-size: 28px; }
    h2 { margin: 0 0 12px; font-size: 14px; text-transform: uppercase; color: #6b7280; }
    button { border: 1px solid #d8dee9; border-radius: 8px; padding: 10px; font-size: 14px; cursor: pointer; }
    .actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px; }
    .primary { background: #0f766e; border-color: #0f766e; color: #fff; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; background: #fff; }
    th, td { border-bottom: 1px solid #edf2f7; padding: 10px; text-align: left; vertical-align: top; }
    th { font-size: 11px; text-transform: uppercase; color: #6b7280; background: #f9fafb; }
    .table-wrap { border: 1px solid #d8dee9; border-radius: 10px; overflow: hidden; }
    .mono { font-family: Consolas, "Cascadia Code", monospace; font-size: 12px; }
    .metrics { display: grid; gap: 10px; grid-template-columns: repeat(4, minmax(120px, 1fr)); }
    .metric { border: 1px solid #d8dee9; border-radius: 10px; padding: 10px; background: #fff; }
    .metric .k { font-size: 11px; color: #6b7280; text-transform: uppercase; }
    .metric .v { margin-top: 6px; font-family: Consolas, "Cascadia Code", monospace; font-size: 16px; }
    @media (max-width: 860px) { .metrics { grid-template-columns: repeat(2, minmax(120px, 1fr)); } }
  </style>
</head>
<body>
  <main class="wrap">
    <div class="panel">
      <div class="top">
        <div>
          <h1>Evaluation Run</h1>
          <div id="runMeta" class="mono">run={{ run_id }}</div>
        </div>
        <div class="nav">
          <a href="/ask-ui">Ask</a>
          <a href="/evaluation-ui">Evaluation</a>
          <a href="/evaluation-history-ui">History</a>
          <button id="logoutBtn" type="button">Logout</button>
        </div>
      </div>
    </div>

    <div class="panel">
      <h2>Actions</h2>
      <div class="actions">
        <button id="refreshBtn" class="primary" type="button">Refresh Run</button>
        <button id="rerunBtn" type="button">Rerun Failed Cases</button>
      </div>
      <div id="msg" class="mono" style="margin-top:8px;">Ready.</div>
    </div>

    <div class="panel">
      <h2>Run Metrics</h2>
      <div class="metrics">
        <div class="metric"><div class="k">Processed</div><div class="v" id="mProcessed">-</div></div>
        <div class="metric"><div class="k">Hit@k</div><div class="v" id="mHit">-</div></div>
        <div class="metric"><div class="k">Recall@k</div><div class="v" id="mRecall">-</div></div>
        <div class="metric"><div class="k">MRR</div><div class="v" id="mMrr">-</div></div>
        <div class="metric"><div class="k">Accuracy</div><div class="v" id="mAcc">-</div></div>
        <div class="metric"><div class="k">Completeness</div><div class="v" id="mComp">-</div></div>
        <div class="metric"><div class="k">Relevance</div><div class="v" id="mRel">-</div></div>
        <div class="metric"><div class="k">Groundedness</div><div class="v" id="mGround">-</div></div>
      </div>
    </div>

    <div class="panel">
      <h2>Cases</h2>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Status</th>
              <th>Question</th>
              <th>Retrieval</th>
              <th>Judge</th>
              <th>Error</th>
            </tr>
          </thead>
          <tbody id="casesBody">
            <tr><td colspan="6" class="mono">No cases loaded.</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <script src="/static/js/ui_auth.js"></script>
  <script>
    const pollIntervalMs = Number({{ poll_interval_ms | tojson }});
    const runId = {{ run_id | tojson }};
    const state = { timer: null };

    const el = {
      refreshBtn: document.getElementById("refreshBtn"),
      rerunBtn: document.getElementById("rerunBtn"),
      logoutBtn: document.getElementById("logoutBtn"),
      msg: document.getElementById("msg"),
      runMeta: document.getElementById("runMeta"),
      mProcessed: document.getElementById("mProcessed"),
      mHit: document.getElementById("mHit"),
      mRecall: document.getElementById("mRecall"),
      mMrr: document.getElementById("mMrr"),
      mAcc: document.getElementById("mAcc"),
      mComp: document.getElementById("mComp"),
      mRel: document.getElementById("mRel"),
      mGround: document.getElementById("mGround"),
      casesBody: document.getElementById("casesBody"),
    };

    function setMsg(text) { el.msg.textContent = text; }

    function fmt(value, digits = 3) {
      if (value === null || value === undefined) return "-";
      if (typeof value !== "number") return String(value);
      return value.toFixed(digits);
    }

    function renderRun(run) {
      el.runMeta.textContent = `run=${run.run_id} | doc=${run.doc_id} | status=${run.run_status} | dataset=${run.dataset_name}`;
      el.mProcessed.textContent = `${run.processed_cases}/${run.total_cases}`;
      el.mHit.textContent = fmt(run.hit_at_k);
      el.mRecall.textContent = fmt(run.recall_at_k);
      el.mMrr.textContent = fmt(run.mrr);
      el.mAcc.textContent = fmt(run.accuracy_avg, 2);
      el.mComp.textContent = fmt(run.completeness_avg, 2);
      el.mRel.textContent = fmt(run.relevance_avg, 2);
      el.mGround.textContent = fmt(run.groundedness_avg, 2);
    }

    function renderCases(items) {
      if (!items.length) {
        el.casesBody.innerHTML = `<tr><td colspan="6" class="mono">No cases loaded.</td></tr>`;
        return;
      }
      el.casesBody.innerHTML = items.map((item) => {
        const retrieval = `hit=${item.hit ?? "-"} | recall=${fmt(item.recall)} | rr=${fmt(item.reciprocal_rank)}`;
        const judge = `${item.accuracy ?? "-"}/${item.completeness ?? "-"}/${item.relevance ?? "-"}/${item.groundedness ?? "-"}`;
        return `<tr>
          <td class="mono">${item.case_index}</td>
          <td class="mono">${item.case_status}</td>
          <td>${item.question}</td>
          <td class="mono">${retrieval}</td>
          <td class="mono">${judge}</td>
          <td class="mono">${item.error_message ?? "-"}</td>
        </tr>`;
      }).join("");
    }

    function stopPolling() {
      if (state.timer) {
        clearInterval(state.timer);
        state.timer = null;
      }
    }

    async function refreshAll() {
      const run = await window.uiAuth.apiFetch(`/evaluations/${runId}`);
      const caseLimit = Math.max(1, Number(run.total_cases || 1));
      const cases = await window.uiAuth.apiFetch(`/evaluations/${runId}/cases?limit=${caseLimit}&offset=0`);
      renderRun(run);
      renderCases(cases.items || []);
      if (run.run_status === "completed" || run.run_status === "failed") {
        stopPolling();
      }
      return run;
    }

    function startPolling() {
      stopPolling();
      state.timer = setInterval(() => {
        refreshAll().catch((err) => setMsg(String(err)));
      }, pollIntervalMs);
    }

    el.refreshBtn.addEventListener("click", async () => {
      try {
        const run = await refreshAll();
        setMsg(`Refreshed. status=${run.run_status}`);
      } catch (err) {
        setMsg(String(err?.message || err));
      }
    });

    el.rerunBtn.addEventListener("click", async () => {
      try {
        const result = await window.uiAuth.apiFetch(`/evaluations/${runId}/rerun-failed`, {
          method: "POST",
        });
        setMsg(`Rerun queued for ${result.queued_failed_cases} failed case(s).`);
        await refreshAll();
        startPolling();
      } catch (err) {
        setMsg(String(err?.message || err));
      }
    });

    el.logoutBtn.addEventListener("click", () => {
      window.uiAuth.logout();
    });

    window.uiAuth.requireAuthOrRedirect();
  </script>
</body>
</html>
