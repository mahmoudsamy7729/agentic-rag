<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Evaluation History</title>
  <style>
    body { font-family: "Segoe UI", Arial, sans-serif; margin: 0; background: #f5f7fb; color: #111827; }
    .wrap { max-width: 1100px; margin: 0 auto; padding: 24px; }
    .panel { background: #fff; border: 1px solid #d8dee9; border-radius: 12px; padding: 16px; margin-bottom: 16px; }
    .top { display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
    .nav { display: flex; gap: 8px; flex-wrap: wrap; }
    .nav a, .nav button { border: 1px solid #d8dee9; border-radius: 8px; padding: 8px 10px; font-size: 13px; text-decoration: none; background: #fff; color: #111827; cursor: pointer; }
    h1 { margin: 0 0 8px; font-size: 28px; }
    h2 { margin: 0 0 12px; font-size: 14px; text-transform: uppercase; color: #6b7280; }
    label { display: block; margin-bottom: 6px; font-size: 12px; text-transform: uppercase; color: #6b7280; }
    input, select, button { border: 1px solid #d8dee9; border-radius: 8px; padding: 10px; font-size: 14px; box-sizing: border-box; }
    input, select { width: 100%; }
    .actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px; }
    button { cursor: pointer; }
    .primary { background: #0f766e; border-color: #0f766e; color: #fff; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; background: #fff; }
    th, td { border-bottom: 1px solid #edf2f7; padding: 10px; text-align: left; vertical-align: top; }
    th { font-size: 11px; text-transform: uppercase; color: #6b7280; background: #f9fafb; }
    .table-wrap { border: 1px solid #d8dee9; border-radius: 10px; overflow: hidden; }
    .mono { font-family: Consolas, "Cascadia Code", monospace; font-size: 12px; }
    .compare { white-space: pre-wrap; border: 1px solid #d8dee9; border-radius: 10px; padding: 10px; background: #fafcff; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    @media (max-width: 860px) { .row { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <main class="wrap">
    <div class="panel">
      <div class="top">
        <div>
          <h1>Evaluation History</h1>
          <div class="mono">History + run comparison. Open run details to inspect cases and rerun failures.</div>
        </div>
        <div class="nav">
          <a href="/documents-ui">Documents</a>
          <a href="/ask-ui">Ask</a>
          <a href="/evaluation-ui">Evaluation</a>
          <button id="logoutBtn" type="button">Logout</button>
        </div>
      </div>
    </div>

    <div class="panel">
      <h2>Query</h2>
      <div class="row" style="margin-top:10px;">
        <div>
          <label for="docFilter">Document Filter (optional)</label>
          <input id="docFilter" type="text" placeholder="doc-..." />
        </div>
      </div>
      <div class="actions">
        <button id="loadBtn" class="primary" type="button">Load Runs</button>
        <button id="openEvalBtn" type="button">Open Evaluation Page</button>
      </div>
      <div id="msg" class="mono" style="margin-top:8px;">Ready.</div>
    </div>

    <div class="panel">
      <h2>Run History</h2>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Run</th>
              <th>Doc</th>
              <th>Status</th>
              <th>Metrics</th>
              <th>Config</th>
              <th>Open</th>
            </tr>
          </thead>
          <tbody id="historyBody">
            <tr><td colspan="6" class="mono">No runs loaded.</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <div class="panel">
      <h2>Compare Two Runs</h2>
      <div class="row">
        <div>
          <label for="runA">Run A</label>
          <select id="runA"></select>
        </div>
        <div>
          <label for="runB">Run B</label>
          <select id="runB"></select>
        </div>
      </div>
      <div class="actions">
        <button id="compareBtn" type="button">Compare</button>
      </div>
      <div id="compareOut" class="compare mono">Select two runs and compare.</div>
    </div>
  </main>

  <script src="/static/js/ui_auth.js"></script>
  <script>
    const state = { runs: [] };

    const el = {
      docFilter: document.getElementById("docFilter"),
      loadBtn: document.getElementById("loadBtn"),
      openEvalBtn: document.getElementById("openEvalBtn"),
      logoutBtn: document.getElementById("logoutBtn"),
      msg: document.getElementById("msg"),
      historyBody: document.getElementById("historyBody"),
      runA: document.getElementById("runA"),
      runB: document.getElementById("runB"),
      compareBtn: document.getElementById("compareBtn"),
      compareOut: document.getElementById("compareOut"),
    };

    function setMsg(text) { el.msg.textContent = text; }

    function fmt(value, digits = 3) {
      if (value === null || value === undefined) return "-";
      if (typeof value !== "number") return String(value);
      return value.toFixed(digits);
    }

    function runLabel(run) {
      return `${run.run_id.slice(0, 8)} | ${run.doc_id} | ${run.run_status}`;
    }

    function renderSelectors() {
      const options = state.runs.map((r) => `<option value="${r.run_id}">${runLabel(r)}</option>`).join("");
      el.runA.innerHTML = options;
      el.runB.innerHTML = options;
      if (state.runs.length > 1) {
        el.runA.value = state.runs[0].run_id;
        el.runB.value = state.runs[1].run_id;
      }
    }

    function renderHistory(items) {
      state.runs = items;
      renderSelectors();
      if (!items.length) {
        el.historyBody.innerHTML = `<tr><td colspan="6" class="mono">No runs loaded.</td></tr>`;
        return;
      }
      el.historyBody.innerHTML = items.map((run) => {
        const cfg = run.config || {};
        const metrics = `Hit=${fmt(run.hit_at_k)} | Recall=${fmt(run.recall_at_k)} | MRR=${fmt(run.mrr)}`;
        const configLine = `k=${cfg.rag_top_k ?? "-"}, prefetch=${cfg.rag_prefetch_k ?? "-"}, embed=${cfg.embedding_model ?? "-"}`;
        return `<tr>
          <td class="mono">${run.run_id.slice(0, 8)}</td>
          <td class="mono">${run.doc_id}</td>
          <td class="mono">${run.run_status}</td>
          <td class="mono">${metrics}</td>
          <td class="mono">${configLine}</td>
          <td><a class="mono" href="/evaluation-runs/${run.run_id}/ui">open</a></td>
        </tr>`;
      }).join("");
    }

    function renderCompare() {
      const idA = el.runA.value;
      const idB = el.runB.value;
      const runA = state.runs.find((r) => r.run_id === idA);
      const runB = state.runs.find((r) => r.run_id === idB);
      if (!runA || !runB) {
        el.compareOut.textContent = "Selected runs are not available.";
        return;
      }
      const a = runA.config || {};
      const b = runB.config || {};
      el.compareOut.textContent =
`Metrics
A(${runA.run_id.slice(0,8)}): Hit=${fmt(runA.hit_at_k)} Recall=${fmt(runA.recall_at_k)} MRR=${fmt(runA.mrr)} Acc=${fmt(runA.accuracy_avg,2)} Comp=${fmt(runA.completeness_avg,2)} Rel=${fmt(runA.relevance_avg,2)} Ground=${fmt(runA.groundedness_avg,2)}
B(${runB.run_id.slice(0,8)}): Hit=${fmt(runB.hit_at_k)} Recall=${fmt(runB.recall_at_k)} MRR=${fmt(runB.mrr)} Acc=${fmt(runB.accuracy_avg,2)} Comp=${fmt(runB.completeness_avg,2)} Rel=${fmt(runB.relevance_avg,2)} Ground=${fmt(runB.groundedness_avg,2)}

Config
rag_top_k: A=${a.rag_top_k ?? "-"} | B=${b.rag_top_k ?? "-"}
rag_prefetch_k: A=${a.rag_prefetch_k ?? "-"} | B=${b.rag_prefetch_k ?? "-"}
embedding_provider: A=${a.embedding_provider ?? "-"} | B=${b.embedding_provider ?? "-"}
embedding_model: A=${a.embedding_model ?? "-"} | B=${b.embedding_model ?? "-"}
reranker_enabled: A=${a.reranker_enabled ?? "-"} | B=${b.reranker_enabled ?? "-"}
reranker_model: A=${a.reranker_model ?? "-"} | B=${b.reranker_model ?? "-"}
answer_model: A=${a.answer_model ?? "-"} | B=${b.answer_model ?? "-"}
chunk_strategy: A=${a.chunk_strategy ?? "-"} | B=${b.chunk_strategy ?? "-"}
chunk_size: A=${a.chunk_size ?? "-"} | B=${b.chunk_size ?? "-"}
chunk_overlap: A=${a.chunk_overlap ?? "-"} | B=${b.chunk_overlap ?? "-"}`;
    }

    async function loadRuns() {
      const qs = new URLSearchParams({ limit: "100", offset: "0" });
      const doc = el.docFilter.value.trim();
      if (doc) qs.set("doc_id", doc);
      const payload = await window.uiAuth.apiFetch(`/evaluations?${qs.toString()}`);
      renderHistory(payload.items || []);
      setMsg(`Loaded ${payload.total} run(s).`);
    }

    el.loadBtn.addEventListener("click", async () => {
      try { await loadRuns(); } catch (err) { setMsg(String(err?.message || err)); }
    });

    el.compareBtn.addEventListener("click", renderCompare);

    el.openEvalBtn.addEventListener("click", () => {
      window.location.href = "/evaluation-ui";
    });

    el.logoutBtn.addEventListener("click", () => {
      window.uiAuth.logout();
    });

    window.uiAuth.requireAuthOrRedirect();
  </script>
</body>
</html>
